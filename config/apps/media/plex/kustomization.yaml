apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plex

helmCharts:
- name: universal
  repo: https://charts.computersthatwork.ca/
  releaseName: plex
  namespace: plex
  version: 1.0.4
  includeCRDs: true
  valuesInline:
    global:
      fullnameOverride: plex
    image:
      pullPolicy: Always
      repository: linuxserver/plex
      tag: latest

    hostNetwork: true

    env:
      TZ: America/Toronto
      PUID: "0"
      PGID: "0"
      VERSION: latest
      PLEX_CLAIM: claim-gbMa_SJts9i19NVuoQ5x

    service:
      main:
        primary: false
        enabled: false
      lb-bgp:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: 192.168.2.217
        annotations:
          metallb.universe.tf/address-pool: external
        externalTrafficPolicy: Local
        ports:
          controller:
            enabled: true
            port: 32400
            nodePort: 32400
            targetPort: 32400
            protocol: TCP

    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: nginx
          # cert-manager.io/cluster-issuer: le-global-issuer
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: 1024m
          cloudflare-operator.io/content: computersthatwork.ca.
          # cloudflare-operator.io/ip-ref: "dynamic-external-ipv4-address"
          cloudflare-operator.io/type: CNAME
          cloudflare-operator.io/proxied: "false"
          cloudflare-operator.io/ttl: "300"
          cloudflare-operator.io/interval: 5m
          external-dns.alpha.kubernetes.io/hostname: plex.computersthatwork.ca
          external-dns.alpha.kubernetes.io/target: 192.168.2.169
        hosts:
          - host: plex.computersthatwork.ca
            paths:
            - path: /
              pathType: Prefix
        tls:
        - secretName: wildcard-ctw-ca-tls
          hosts:
          - plex.computersthatwork.ca
    probes:
      liveness:
        enabled: true
        custom: true      
        spec:
          # initialDelaySeconds: 10
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 32400
          timeoutSeconds: 1
      readiness:
        enabled: true
        custom: true      
        spec:
          # initialDelaySeconds: 10
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 32400
          timeoutSeconds: 1
      startup:
        enabled: true
        custom: true      
        spec:
          initialDelaySeconds: 5
          failureThreshold: 9999
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 32400
          timeoutSeconds: 1

    autoscaling:
      enabled: true
      target:  plex
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage:  80
      targetMemoryUtilizationPercentage:  80
    resources:
      # limits:
      #   cpu: 4
      #   memory: 4096Mi
      requests:
        cpu: 100m
        memory: 1024Mi
    dnsConfig:
      options:
        - name: ndots
          value: "1"
    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.2.245
        path: /mnt/Main/Media/kubernetes/plex/config
        mountPath: /config
        accessModes:
          - ReadWriteMany 
      # config:
      #   enabled: true
      #   # path: /mnt/Main/Media/k8s/nfs-provisioner/plex/config
      #   mountPath: /config
      #   type: emptyDir
      #   size: 5Gi
      transcode:
        enabled: true
        type: nfs
        server: 192.168.2.245
        path: /mnt/Main/Media/Transcode
        mountPath: /transcode
      media-tv:
        enabled: true
        type: nfs
        server: 192.168.2.245
        path: /mnt/Main/Media/TV
        mountPath: /mnt/Media/Television
      media-movies:
        enabled: true
        type: nfs
        server: 192.168.2.245
        path: /mnt/Main/Media/Movies
        mountPath: /mnt/Media/Movies
      media-music:
        enabled: true
        type: nfs
        server: 192.168.2.245
        path: /mnt/Main/Media/Music
        mountPath: /mnt/Media/Music
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0


